<html>
<head>
<style>
*{
margin: 0;
padding: 0;
box-sizing: border-box;
}
body{
background-color: white;
font-style: normal;
}
.nav-bar{
display: flex;
padding: 10px 20px;
border-radius: 4px;
background-color: brown;
align-items: center;
justify-content: space-between;
position: relative;
}
.dynamic-table{
border-collapse: separate;
border-spacing: 0 5px;
background-color: #008B8B;
}
#button-row {
 display: flex;
 justify-content: flex-end;
 padding-right: 20px;
 margin-right: 100px;
 }
#submit-table{
background-color: orange;
font-weight: bold;
padding: 10px;
border-radius: 10px;
}
#submit-table:hover{
background-color: yellow;
padding: 10px;
border-radius: 10px;
font-weight: bold;
}

.hamburger{
display: flex;
flex-direction: column;
justify-content: center;
cursor: pointer;
}
.bar{
width: 25px;
height: 3px;
background-color: white;
margin: 3px 0;
border-radius: 2px;
}
.title{
position: absolute;
left:100%;
transform: traslatex(-50%);
font-size: 20px;
font-weight: bold;
}
.rigt-section{
display: flex;
align-items: center;
gap: 10px;
}
.search-box input{
padding: 6px 12px;
border-radius: 4px;
border: none;
}
.help{
padding: 6px 12px;
background-color: orange;
color: 007bff;
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
}
.help:hover{
background-color: blue;
}
#flist{
display: flex;
gap: 460px;
}
#jlist{
display: flex;
gap: 20px;
}

li{
list-style: none;

}
tr{
gap: 30px;
}
.table-box{
background-color: FFF5EE;
width: 70%;
padding: 20px;
border-radius: 10px;
height: 100%;
box-shadow: 5px 5px 9px 3px grey;
}
</style>

</head>
<body>
<div class="nav-bar">
    <ul id="flist">
        <li>
            <div class="hamburger">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </li>
        <li>
            <div>
                <h1><i>semester registration</i></h1>
            </div>
        </li>
    </ul>
    <ul id="jlist">
        <li>
            <div class="search-section">
                <div class="search-box">
                    <input type="text" placeholder="search">
                </div>
            </div>
        </li>
        <li>
            <button class="help">help?</button>
        </li>
    </ul>
</div>

<center>
<div class="table-box">
    <h2 style="text-align: center; color: blue;">Enter Your Courses</h2>
    <div id="courseInputContainer" style="text-align: center; margin-bottom: 15px;">
        <label for="courseCount" style="color: black;">Enter number of courses:</label>
        <input type="number" id="courseCount" min="1" max="20" placeholder="e.g. 5">
    </div>
    
    <form id="courseForm">
        <table class="dynamic-table" border="1" style="width: 75%; border-collapse: collapse; margin-bottom: 20px;">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Code</th>
                    <th>Course Title</th>
                    <th>Year</th>
                    <th>Semester</th>
                </tr>
            </thead>
            <tbody id="courseTableBody">
                <!-- Rows will appear here -->
            </tbody>
        </table>
        <div id="button-row">
            <button type="submit" id="submit-table">Check Preview!!</button>
        </div>
    </form>

    <script>
        const input = document.getElementById('courseCount');
        const tbody = document.getElementById('courseTableBody');
        const courseInputContainer = document.getElementById('courseInputContainer');
        const form = document.getElementById('courseForm');

        input.addEventListener('input', function() {
            const count = parseInt(this.value);
            tbody.innerHTML = '';

            if (!isNaN(count) && count > 0) {
                courseInputContainer.style.opacity = '0.3';
                
                for (let i = 1; i <= count; i++) {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td>${i}</td>
                        <td><center><input name="code${i}" id="code${i}" type="text" size="3"></center></td>
                        <td><center><input name="title${i}" id="title${i}" type="text" size="59"></center></td>
                        <td><center><input name="year${i}" id="year${i}" type="text" size="1"></center></td>
                        <td><center><input name="sem${i}" id="sem${i}" type="text" size="1"></center></td>
                    `;
                    
                    tbody.appendChild(row);
                }
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const tableData = [];
            const count = parseInt(document.getElementById("courseCount").value);

            for(let i = 1; i <= count; i++) {
                const course = {
                    code: document.getElementById('code'+i).value,
                    title: document.getElementById('title'+i).value,
                    year: document.getElementById('year'+i).value,
                    sem: document.getElementById('sem'+i).value
                };
                tableData.push(course);
            }

            sessionStorage.setItem("moduleData", JSON.stringify(tableData));
            window.location.href = "preview.php";
        });
    </script>
</div>
</center>
</body>
</html>
